<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Tags -->
  <title>DSA Pattern Tracker - Master 20 Patterns & 100 Problems</title>
  <meta name="description" content="An interactive preparation tracker mapping 20 essential coding patterns to 100 problems. Features local progress savings, Python solutions, and direct video resources.">
  <meta name="keywords" content="DSA, Data Structures, Algorithms, Coding Interview Prep, LeetCode, Sliding Window, DP, Graph, Python, NeetCode">
  <meta name="author" content="Aayush Kasurde">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header Section -->
  <header>
    <div class="header-top">
      <div class="header-title">
        <h1>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          DSA Pattern Tracker
        </h1>
        <p>Master 20 Patterns &bull; 100 Hand-Picked Problems &bull; 4 Weeks Plan</p>
      </div>
      <button class="theme-btn" id="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle light/dark theme">
        <!-- Sun icon (shown in light mode) -->
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <!-- Moon icon (shown in dark mode) -->
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>

    <!-- Dashboard Panel -->
    <div class="dashboard-grid" id="statsDashboard">
      <div class="progress-container">
        <div class="progress-circle">
          <svg>
            <defs>
              <linearGradient id="progress-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3b82f6" />
                <stop offset="100%" stop-color="#8b5cf6" />
              </linearGradient>
            </defs>
            <circle class="bg-ring" cx="70" cy="70" r="65"></circle>
            <circle class="fill-ring" id="dashboardProgressRing" cx="70" cy="70" r="65"></circle>
          </svg>
          <div class="progress-text">
            <div class="progress-val" id="dashboardPct">0%</div>
            <div class="progress-lbl">Mastered</div>
          </div>
        </div>
      </div>

      <div class="stats-panel">
        <div class="stats-summary">
          <div class="stat-box">
            <div class="stat-val" id="statSolved">0</div>
            <div class="stat-lbl">Problems Solved</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="statRemaining">100</div>
            <div class="stat-lbl">Remaining</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="statActiveWeek">Week 1</div>
            <div class="stat-lbl">Active Stage</div>
          </div>
        </div>

        <div>
          <div class="difficulty-bar">
            <div class="diff-segment easy" id="barEasy" style="width: 0%"></div>
            <div class="diff-segment medium" id="barMedium" style="width: 0%"></div>
            <div class="diff-segment hard" id="barHard" style="width: 0%"></div>
          </div>
          <div class="difficulty-legend">
            <div class="legend-item">
              <span class="legend-dot easy"></span> Easy: <span id="lblEasyCount">0</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot medium"></span> Medium: <span id="lblMediumCount">0</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot hard"></span> Hard: <span id="lblHardCount">0</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Controls and Search Panel -->
  <div class="controls">
    <div class="search-wrapper">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" class="search-input" id="searchBar" placeholder="Search patterns or problem names..." oninput="handleSearch()">
    </div>

    <div class="filter-tabs" id="weekTabs">
      <!-- Generated dynamically -->
    </div>
  </div>

  <!-- Main content area -->
  <main id="weeksContainer">
    <!-- Generated dynamically -->
  </main>

  <!-- Danger Zone Reset Option -->
  <div class="danger-zone">
    <button class="reset-btn" id="resetProgressBtn" onclick="resetAllProgress()">Reset Tracker Progress</button>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
